<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BadWallet - Succès</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .success-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-primary);
        }
        .success-card {
            background: white;
            border-radius: var(--border-radius);
            padding: 48px;
            text-align: center;
            max-width: 440px;
            width: 90%;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.6s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .success-card .check {
            font-size: 80px;
            animation: checkAnim 0.6s ease;
        }
        @keyframes checkAnim {
            0% { transform: scale(0) rotate(-30deg); opacity: 0; }
            50% { transform: scale(1.3) rotate(5deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        .confetti {
            position: fixed;
            font-size: 30px;
            animation: confettiFall 3s ease forwards;
            pointer-events: none;
            z-index: 999;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(calc(100vh + 100px)) rotate(720deg); opacity: 0; }
        }
        .success-card .ref {
            color: var(--text-secondary);
            font-size: 14px;
            background: var(--background);
            padding: 8px 16px;
            border-radius: 8px;
            display: inline-block;
            margin: 8px 0;
        }
        .success-card .amount {
            font-size: 32px;
            font-weight: 700;
            margin: 16px 0;
            color: var(--primary);
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .action-buttons .btn { flex: 1; justify-content: center; }
    </style>
</head>
<body>
    <div class="success-page">
        <div class="success-card">
            <div class="check">✅</div>
            <h1>Payment Successful!</h1>
            <p style="color:var(--text-secondary);">Votre transaction a été effectuée avec succès</p>
            <div class="ref">📋 Réf: TXN-2026-06-26-001234</div>
            <div class="amount">50 000 FCFA</div>
            <div style="background:var(--background);border-radius:12px;padding:12px;font-size:14px;color:var(--text-secondary);">
                <div style="display:flex;justify-content:space-between;padding:2px 0;">
                    <span>Wallet</span>
                    <span style="color:var(--text);font-weight:500;">John Doe</span>
                </div>
                <div style="display:flex;justify-content:space-between;padding:2px 0;">
                    <span>Date</span>
                    <span style="color:var(--text);font-weight:500;">26/06/2026 14:32</span>
                </div>
                <div style="display:flex;justify-content:space-between;padding:2px 0;">
                    <span>Type</span>
                    <span style="color:var(--text);font-weight:500;">Paiement</span>
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn btn-outline" onclick="window.print()">🖨️ Recevoir</button>
                <button class="btn btn-secondary" onclick="navigator.share ? navigator.share({title:'BadWallet - Paiement',text:'Paiement de 50 000 FCFA effectué avec succès'}) : alert('Partager ce reçu')">📤 Partager</button>
            </div>
            <button class="btn btn-primary btn-block" style="margin-top:12px;" onclick="window.location.href='index.html';">🏠 Retour à l'accueil</button>
        </div>
    </div>
    <script>
        // Confetti effect
        const emojis = ['🎉', '✨', '🎊', '💳', '💰', '⭐', '🌈'];
        for (let i = 0; i < 30; i++) {
            setTimeout(() => {
                const el = document.createElement('div');
                el.className = 'confetti';
                el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                el.style.left = Math.random() * 100 + 'vw';
                el.style.fontSize = (20 + Math.random() * 25) + 'px';
                el.style.animationDuration = (2 + Math.random() * 2) + 's';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 4000);
            }, i * 100);
        }
    </script>
</body>
</html>
