<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BadWallet - Connexion</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            background: var(--background);
        }
        .login-left {
            flex: 1;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }
        .login-left::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            top: -200px;
            right: -200px;
        }
        .login-left::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
            bottom: -100px;
            left: -100px;
        }
        .login-illustration {
            text-align: center;
            color: white;
            position: relative;
            z-index: 1;
        }
        .login-illustration .big-icon { font-size: 120px; margin-bottom: 24px; display: block; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.2)); }
        .login-illustration h1 { font-size: 48px; font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; }
        .login-illustration p { font-size: 18px; opacity: 0.8; font-weight: 300; }
        .login-illustration .icons-row {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 40px;
            font-size: 40px;
        }
        .login-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .login-card {
            background: var(--card);
            border-radius: var(--border-radius);
            padding: 48px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow);
        }
        .login-card .logo { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
        .login-card .subtitle { color: var(--text-secondary); font-size: 15px; margin-bottom: 32px; }
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 24px 0 28px 0;
        }
        .form-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .form-options label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }
        .form-options a { color: var(--primary); text-decoration: none; font-size: 14px; font-weight: 500; }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: var(--border-radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Poppins', sans-serif;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 87, 255, 0.3);
        }
        @media (max-width: 992px) {
            .login-left { display: none; }
            .login-right { flex: 1; padding: 20px; }
            .login-card { padding: 32px 24px; }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-left">
            <div class="login-illustration">
                <span class="big-icon">💳</span>
                <h1>BADWALLET</h1>
                <p>Secure Digital Wallet</p>
                <div class="icons-row">
                    <span>📱</span>
                    <span>💳</span>
                    <span>🏦</span>
                    <span>👛</span>
                </div>
            </div>
        </div>
        <div class="login-right">
            <div class="login-card">
                <div class="logo gradient-text">BADWALLET</div>
                <p class="subtitle">Sign in to your wallet</p>
                <form>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" placeholder="+221 77 123 45 67" value="771234567">
                    </div>
                    <div class="form-group">
                        <label>PIN Code</label>
                        <input type="password" placeholder="••••" value="1234">
                    </div>
                    <div class="form-options">
                        <label><input type="checkbox" checked> Remember me</label>
                        <a href="#">Forgot PIN?</a>
                    </div>
                    <button type="submit" class="btn-login" onclick="event.preventDefault(); window.location.href='index.html';">LOGIN</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
